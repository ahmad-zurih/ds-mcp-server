# Configuration for auto-generated GitHub release notes.
# See https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
#
# Label your PRs with one of the categories below and they will be grouped
# automatically in each release's changelog.

changelog:
  exclude:
    labels:
      - ignore-for-release
      - dependencies-dev
    authors:
      - dependabot

  categories:
    - title: 🚨 Breaking changes
      labels:
        - breaking
        - breaking-change

    - title: 🚀 Features
      labels:
        - feature
        - enhancement

    - title: 🐛 Bug fixes
      labels:
        - bug
        - fix

    - title: 🔒 Security
      labels:
        - security

    - title: 📚 Documentation
      labels:
        - documentation
        - docs

    - title: 🧪 Tests & CI
      labels:
        - test
        - tests
        - ci

    - title: 🧹 Maintenance
      labels:
        - chore
        - refactor
        - maintenance

    - title: 📦 Dependencies
      labels:
        - dependencies

    - title: Other changes
      labels:
        - "*"
