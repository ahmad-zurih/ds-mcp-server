name: Publish

# Publishes on tag pushes:
#   v1.2.3          -> production PyPI
#   v1.2.3rc1       -> TestPyPI (also matches a/b/rc/dev pre-release suffixes)
#   v1.2.3a1        -> TestPyPI
#   v1.2.3b2        -> TestPyPI
#
# Uses PyPI Trusted Publishing (OIDC) — NO API tokens stored in this repo.
# See RELEASING.md for the one-time trusted-publisher setup on pypi.org.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Run tests before publishing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm needs the full history + tags
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pytest
        run: pytest -v

  build:
    name: Build sdist and wheel
    needs: test
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.classify.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm needs tags
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build distributions
        run: python -m build
      - name: Show built artifacts
        run: ls -la dist/
      - name: Classify tag as prerelease or final
        id: classify
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" =~ (a|b|rc|dev)[0-9]* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG is a pre-release."
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG is a final release."
          fi
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI (pre-releases)
    needs: build
    if: needs.build.outputs.is_prerelease == 'true'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/ds-mcp-server/
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI (final releases)
    needs: build
    if: needs.build.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ds-mcp-server/
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: [build, publish-pypi, publish-testpypi]
    # Run whenever build succeeded, even if one of the publish jobs was skipped
    # (only one publish job runs per tag — the other is skipped by the `if` above).
    if: always() && needs.build.result == 'success' && (needs.publish-pypi.result == 'success' || needs.publish-testpypi.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create a release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          PRERELEASE_FLAG=""
          if [[ "$TAG" =~ (a|b|rc|dev)[0-9]* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            $PRERELEASE_FLAG \
            dist/*
